# golangci-lint configuration (v2 schema).
# Run locally with: golangci-lint run
version: "2"

run:
  timeout: 5m

linters:
  # Start from the curated default set (errcheck, govet, ineffassign,
  # staticcheck, unused) and add linters that are valuable for a
  # Terraform provider without being noisy.
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - gocritic
    - misspell
    - nilerr
    - noctx
    - revive
    - unconvert
    - usestdlibvars
    - whitespace
  settings:
    revive:
      rules:
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Table-driven acceptance tests intentionally omit request contexts.
      - path: _test\.go
        linters:
          - noctx

formatters:
  enable:
    - gofmt
    - goimports
